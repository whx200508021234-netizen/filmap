<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>纽约电影地图</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="preconnect" href="https://tile.openstreetmap.org" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQAsRyu8dGCmZ6HkP0pEHDNPuZNqHfQ="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css?v=poster-shelf-6" />
  </head>
  <body>
    <main class="shell">
      <aside class="panel" aria-label="影视地点控制面板">
        <button id="panelToggle" class="panel-toggle" type="button" aria-label="收缩左侧面板">‹</button>
        <header class="brand">
          <p class="eyebrow">NYC Screen Atlas</p>
          <h1>纽约电影地图</h1>
          <p class="intro">把美剧和电影里的纽约塞回真实街区：选一部作品，或直接选一条主题路线。</p>
        </header>

        <section class="controls" aria-label="筛选">
          <label class="search">
            <span>搜索作品 / 地点 / 街区</span>
            <input id="searchInput" type="search" placeholder="Friends, Joker, Upper West Side..." />
          </label>

          <div class="filter-group" aria-label="类型筛选">
            <button class="chip" data-theme="romance" type="button">❤️ 纽约爱情</button>
            <button class="chip" data-theme="work" type="button">💼 职场纽约</button>
            <button class="chip" data-theme="crime" type="button">🚔 黑帮与犯罪</button>
            <button class="chip" data-theme="lonely" type="button">🌃 城市孤独</button>
            <button class="chip" data-theme="hero" type="button">🕸️ 超级英雄</button>
            <button class="chip" data-theme="landmark" type="button">🏛️ 经典地标</button>
            <button class="chip" data-theme="first" type="button">👋 第一次来纽约</button>
          </div>

          <div class="selection-box" aria-label="自选路线">
            <div>
              <strong>我喜欢这部剧</strong>
              <span id="selectedSummary">选 2 部以上，自动生成打卡路线</span>
            </div>
            <button id="buildSelectedRoute" type="button">生成路线</button>
          </div>
          <div id="selectedTitles" class="selected-titles"></div>
          <article id="routeCard" class="route-card" aria-live="polite"></article>
        </section>

        <section class="stats" aria-label="统计">
          <div>
            <strong id="visibleCount">0</strong>
            <span>指定作品</span>
          </div>
          <div>
            <strong>7</strong>
            <span>主题路线</span>
          </div>
          <div>
            <strong id="selectedCount">0</strong>
            <span>已选作品</span>
          </div>
        </section>

        <section class="itinerary" aria-label="推荐动线">
          <h2>影迷游客动线</h2>
          <div id="themeRoutes" class="theme-routes"></div>
        </section>

      </aside>

      <section class="map-stage" aria-label="纽约地图">
        <div id="map"></div>
        <aside class="borough-legend" aria-label="纽约 borough 分区">
          <strong>NYC Boroughs</strong>
          <span><i style="background:#f15b55"></i>Manhattan</span>
          <span><i style="background:#6db7df"></i>Brooklyn</span>
          <span><i style="background:#9bd37d"></i>Queens</span>
          <span><i style="background:#b78ad7"></i>Bronx</span>
          <span><i style="background:#d9bb8a"></i>Staten Island</span>
        </aside>
        <article id="detailCard" class="detail-card" aria-live="polite">
          <div class="empty-state">
            <p class="eyebrow">Hover / Click</p>
            <h2>点一个地图标记</h2>
            <p>会显示作品海报感封面、代表场景图、真实地点和打卡提示。</p>
          </div>
        </article>
      </section>

      <section class="list-wrap poster-shelf" aria-label="地点列表">
        <div class="shelf-header">
          <div>
            <p class="eyebrow">Trending Check-ins</p>
            <h2>地点索引</h2>
          </div>
          <span>横向浏览海报，点开自动定位地图</span>
        </div>
        <div id="locationList" class="location-list"></div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js?v=poster-shelf-6"></script>
  </body>
</html>
